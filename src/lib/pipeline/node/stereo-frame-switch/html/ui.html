<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/src/style/common.css">
  <link rel="stylesheet" href="/src/style/kinematoscope.css">
  <link rel="stylesheet" href="/src/style/controls.css">
</head>

<body>
  <table id="UiStereoFrameSwitch" class="controls-table">
    <thead>
      <tr>
        <th colspan="3">
          <strong>NodeStereoFrameSwitch</strong>
        </th>
      </tr>
    </thead>
    <tbody>
      <!-- control description -->
      <tr>
        <td>&emsp;<b>r / R:</b>&emsp;</td>
        <td>Reset to defaults.&emsp;</td>
        <td>&emsp;</td>
      </tr>
      <tr>
        <td>&emsp;<b>f / F:</b>&emsp;</td>
        <td>Full screen toggle.&emsp;</td>
        <td>&emsp;</td>
      </tr>
      <tr>
        <td>&emsp;<b>t / T:</b>&emsp;</td>
        <td>frame switch Toggle.&emsp;</td>
        <td>&emsp;</td>
      </tr>
      <tr>
        <td>&emsp;<b>o / O:</b>&emsp;</td>
        <td>left-right render Order toggle.&emsp;</td>
        <td>&emsp;</td>
      </tr>
      <tr>
        <td>&emsp;<b>l / L:</b>&emsp;</td>
        <td>-/+ frame switch deLay&emsp;</td>
        <td>
          <span id="frameSwitchDelay-config"></span>
          &emsp;
        </td>
      </tr>


      <tr>
        <td class="options-table-row-separator"></td>
      </tr>

      <!-- control values -->
      <tr>
        <td>&emsp;</td>
        <td>frame switch:&emsp;</td>
        <td>
          <span id="frameSwitch"></span>
          &emsp;
        </td>
      </tr>
      <tr>
        <td>&emsp;</td>
        <td>frame switch delay:&emsp;</td>
        <td>
          <span id="frameSwitchDelay"></span>
          &emsp;
        </td>
      </tr>

    </tbody>
  </table>
</body>

</html>
