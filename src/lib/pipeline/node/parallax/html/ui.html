<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/src/style/common.css">
  <link rel="stylesheet" href="/src/style/kinematoscope.css">
  <link rel="stylesheet" href="/src/style/controls.css">
</head>

<body>
  <table id="UiParallax" class="controls-table">
    <thead>
      <tr>
        <th colspan="3">
          <strong>NodeParallax</strong>
        </th>
      </tr>
    </thead>
    <tbody>
      <!-- control description -->
      <tr>
        <td>&emsp;<b>r / R:</b>&emsp;</td>
        <td>reset to defaults.&emsp;</td>
        <td>&emsp;</td>
      </tr>
      <tr>
        <td>&emsp;<b>f / F:</b>&emsp;</td>
        <td>full screen toggle.&emsp;</td>
        <td>&emsp;</td>
      </tr>
      <tr>
        <td>&emsp;<b>x / X:</b>&emsp;</td>
        <td>-/+ x-axis max displacement.&emsp;</td>
        <td>
          <span id="maxDisplacementX-config"></span>
          &emsp;
        </td>
      </tr>
      <tr>
        <td>&emsp;<b>y / Y:</b>&emsp;</td>
        <td>-/+ y-axis max displacement.&emsp;</td>
        <td>
          <span id="maxDisplacementY-config"></span>
          &emsp;
        </td>
      </tr>

      <tr>
        <td class="options-table-row-separator"></td>
      </tr>

      <!-- control values -->
      <tr>
        <td></td>
        <td>x-axis displacement max:&emsp;</td>
        <td>
          <span id="maxDisplacementX"></span>
          &emsp;
        </td>
      </tr>
      <tr>
        <td></td>
        <td>y-axis displacement max:&emsp;</td>
        <td>
          <span id="maxDisplacementY"></span>
          &emsp;
        </td>
      </tr>
      <tr>
        <td></td>
        <td>x-axis displacement:&emsp;</td>
        <td>
          <span id="xDisplacement"></span>
          &emsp;
        </td>
      </tr>
      <tr>
        <td></td>
        <td>y-axis displacement:&emsp;</td>
        <td>
          <span id="yDisplacement"></span>
          &emsp;
        </td>
      </tr>
    </tbody>
  </table>
</body>

</html>
